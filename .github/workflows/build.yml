name: Build Geode Mod

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Windows
          - name: Android 32-bit
            os: ubuntu-latest
            target: Android32
          - name: Android 64-bit
            os: ubuntu-latest
            target: Android64
          - name: macOS
            os: macos-latest
            target: macOS
          - name: Linux
            os: ubuntu-latest
            target: Linux
          - name: iOS
            os: macos-latest
            target: iOS

    name: Compile for ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja -y
        shell: powershell

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        run: |
          cd build
          cmake -G Ninja ..

      - name: Build
        run: |
          cd build
          cmake --build .

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.config.target }}
          path: build/
