name: Build Geode Mod

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
          - name: Android 32-bit
            os: ubuntu-latest
            target: Android32
          - name: Android 64-bit
            os: ubuntu-latest
            target: Android64
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest
          - name: iOS
            os: macos-latest
            target: iOS

    name: Compile for ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode
        run: |
          mkdir -p ~/.geode/profiles
          echo "geode profile setup completed"

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          cli: v3.3.0
          bindings: geode-sdk/bindings
          bindings-ref: main
