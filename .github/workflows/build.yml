name: Build Geode Mod

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
          - name: Android 32-bit
            os: ubuntu-latest
            target: Android32
          - name: Android 64-bit
            os: ubuntu-latest
            target: Android64

    name: Compile for ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      # Tento krok VYNUTÍ vytvoření prázdného profilu, aby Geode nepanikařilo
      - name: Setup Dummy Geode Profile
        run: |
          mkdir -p ~/.geode
          echo '{"default-profile":"default","profiles":{"default":{"gd-path":"","name":"default"}}}' > ~/.geode/config.json

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          cli: v3.3.0
          bindings: geode-sdk/bindings
          bindings-ref: main
